name: "Operators Tests"

on:
  workflow_dispatch:
  pull_request:
    branches: [ "main", "operators/**" ]

# Cancel in progress workflows on pull_requests.
# https://docs.github.com/en/actions/using-jobs/using-concurrency#example-using-a-fallback-value
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

permissions:
  contents: read

# hack for https://github.com/actions/cache/issues/810#issuecomment-1222550359
env:
  SEGMENT_DOWNLOAD_TIMEOUT_MINS: 5

jobs:
  test:
    name: python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 180

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: ./.github/workflows/set-dummy-conf
        name: "Test config setup"

      - uses: ./.github/workflows/test-env-setup
        name: "Test env setup"
        timeout-minutes: 30
        with:
          requirements-file: test-requirements-operators.txt

      - name: "Run Operators Tests"
        timeout-minutes: 180
        shell: bash
        run: |
          set -x # print commands that are executed
          python -m pytest -v -p no:warnings --durations=5 tests/operators --ignore=tests/operators/forecast
