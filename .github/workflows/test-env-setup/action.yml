# This composite action is to avoid duplicating code across test actions.
# Ref: https://docs.github.com/en/actions/creating-actions/creating-a-composite-action

name: "Test env setup"
description: "Install shared test dependencies with uv for GitHub Actions test workflows"
inputs:
  requirements-file:
    description: "Requirements file to install into the GitHub Actions Python environment"
    required: false
    default: "dev-requirements.txt"
runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v7
      with:
        enable-cache: true
        cache-dependency-glob: |
          pyproject.toml
          **requirements.txt

    - shell: bash
      run: |
        set -x # print commands that are executed

        sudo apt update
        sudo apt-get install libkrb5-dev graphviz
        uv pip install --system \
          --extra-index-url https://download.pytorch.org/whl/cpu \
          -r ${{ inputs.requirements-file }}
